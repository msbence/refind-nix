name: CI
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  no-ai-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Fail if AI artifacts are tracked
        run: |
          set -e
          FORBIDDEN='^(CLAUDE\.md|GEMINI\.md|AGENTS\.md|AI-progress\.json|AI-tasks\.json|\.session-handoff\.md|\.claude/|\.gemini/|\.ai-context/|\.cursor/|\.superpowers/|memory/|self-improvements-pending-.*\.jsonl)'
          MATCHES=$(git ls-files | grep -E "$FORBIDDEN" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Tracked AI artifacts detected. These files must be gitignored, never committed:"
            echo "$MATCHES" | sed 's/^/  - /'
            echo ""
            echo "Fix: git rm --cached <file>, then update .gitignore, then commit."
            exit 1
          fi
          echo "Clean — no AI artifacts tracked."

  check:
    runs-on: ubuntu-latest
    needs: no-ai-files
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25  # v22 (node24)

      - name: Eval check
        run: nix flake check --no-build

      - name: Format check
        run: nix fmt -- --check .

      - name: Build themes
        run: nix build --print-build-logs .#refind-theme-minimal

      - name: Verify theme security
        run: |
          # Verify theme output has no PE binaries
          for f in $(find result/ -type f); do
            if [ "$(head -c 2 "$f" 2>/dev/null | od -An -tx1 | tr -d ' ')" = "4d5a" ]; then
              echo "::error::PE binary in built theme: $f"
              exit 1
            fi
          done
          # Verify theme.conf exists
          [ -f result/theme.conf ] || { echo "::error::No theme.conf in output"; exit 1; }
          echo "Theme security checks passed."
